name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Package: ffmpeg-static fetched its per-OS binary at npm ci; electron-builder bundles + installs.
      # macOS: if the Apple signing secrets are set, electron-builder Developer-ID signs and the afterSign
      # hook notarizes + staples; if they're absent (e.g. a fork), the hook falls back to an ad-hoc
      # signature. Windows/Linux ignore these.
      - name: Build installers
        run: npm run dist
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}                                  # base64 of the Developer ID .p12
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}                  # that .p12's export password
          APPLE_ID: ${{ secrets.APPLE_ID }}                                  # Apple ID email
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}                        # e.g. 25LTRKH576

      # CI artifacts for every run (also for workflow_dispatch, which has no tag/release).
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.deb
          if-no-files-found: ignore

      # Attach to the GitHub Release for the tag (each OS job appends its own files).
      - name: Publish to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*.exe
            release/*.exe.blockmap
            release/*.AppImage
            release/*.deb
            release/latest*.yml
